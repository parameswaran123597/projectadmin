<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
        }
        .container {
            width: 80%;
            margin: auto;
            text-align: center;
        }
        h1 {
            margin-top: 30px;
        }
        .card {
            display: inline-block;
            width: 200px;
            padding: 20px;
            margin: 20px;
            background: white;
            box-shadow: 0 0 10px #ccc;
            border-radius: 10px;
        }
        .card a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        .card:hover {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <div class="card">
        <a href="{% url 'user_mgt' %}">User Management</a>
    </div>

    <div class="card">
        <a href="{% url 'content_mod' %}">Content Moderation</a>
    </div>

    <div class="card">
        <a href="{% url 'user_profile' %}">User Profiles</a>
    </div>

    <div class="card">
        <a href="{% url 'indi_recipie' %}">Recipe Info</a>
    </div>

</div>

</body>
</html>
