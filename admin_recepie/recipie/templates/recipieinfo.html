<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
 <style>
        .section-card {
            border-left: 5px solid #28a745;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- MAIN HEADING -->
    <h1 class="text-center font-weight-bold text-primary mb-4">
         Recipe Details
    </h1>

    <!-- RECIPE TITLE -->
    <div class="text-center mb-4">
        <h3 class="font-weight-bold text-dark"></h3>
        <p class="text-muted">
            By <strong></strong> | 👁 Views: <strong></strong>
        </p>
    </div>

    <!-- INGREDIENTS -->
    <div class="card section-card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="text-success">🥕 Ingredients</h4>
           
        </div>
    </div>

    <!-- STEPS -->
    <div class="card section-card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="text-info">📝 Steps</h4>
           
        </div>
    </div>

    <!-- COOKING TIME -->
    <div class="card section-card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="text-warning">⏱ Cooking Time</h4>
            <p class="font-weight-bold"></p>
        </div>
    </div>

    <!-- DIFFICULTY -->
    <div class="card section-card mb-4 shadow-sm">
        <div class="card-body">
            <h4 class="text-danger">🔥 Difficulty Level</h4>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="difficulty" checked>
                <label class="form-check-label text-success">Easy</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="difficulty">
                <label class="form-check-label text-warning">Medium</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="difficulty">
                <label class="form-check-label text-danger">Hard</label>
            </div>

        </div>
    </div>

    <!-- IMAGES -->
    <div class="card section-card mb-5 shadow-sm">
        <div class="card-body">
            <h4 class="text-primary">📸 Recipe Images</h4>

            <div class="row text-center">
                <div class="col-md-4">
                    <img src="https://via.placeholder.com/300" class="img-fluid rounded mb-3">
                </div>
                <div class="col-md-4">
                    <img src="https://via.placeholder.com/300" class="img-fluid rounded mb-3">
                </div>
                <div class="col-md-4">
                    <img src="https://via.placeholder.com/300" class="img-fluid rounded mb-3">
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
